<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Orizon · loading</title>

  <!-- Google Fonts: elegant Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #1b1b2c, #0a0a12 90%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 1rem;
    }

    /* main loading card */
    .loading-splash {
      max-width: 800px;
      width: 100%;
      background: rgba(5, 5, 15, 0.4);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 4rem;
      padding: 3rem 2rem;
      box-shadow: 0 35px 70px -15px #000000, 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Logo animation */
    .logo-frame {
      animation: popAndGlow 1.4s ease-out forwards;
      opacity: 0;
      transform: scale(0.3) rotate(-6deg);
      filter: drop-shadow(0 15px 25px #000000);
      margin-bottom: 2rem;
    }

    @keyframes popAndGlow {
      0% { opacity: 0; transform: scale(0.2) rotate(-12deg); }
      50% { opacity: 1; transform: scale(1.15) rotate(1.5deg); }
      80% { transform: scale(0.98) rotate(0deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .logo-frame img {
      width: 220px;
      max-width: 65vw;
      height: auto;
      border-radius: 40px;
      box-shadow: 0 30px 50px -15px black;
      transition: transform 0.4s ease;
      display: block;
    }

    .logo-frame img:hover {
      transform: scale(1.02);
    }

    /* text effect container */
    .text-zone {
      margin-top: 1.2rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /* main animated text - SIMPLIFIED without reflection/underline */
    .splash-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(2.2rem, 12vw, 4.2rem);
      color: white;
      cursor: default;
      white-space: nowrap;
      opacity: 0;
      padding: 0 0.5rem;
      letter-spacing: 5px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
      transition: text-shadow 0.3s;
      display: inline-block;
      position: relative;
    }

    .splash-text:hover {
      text-shadow: 0 0 20px #ffffff90, 0 0 35px #b0c8ff;
    }

    /* loading bar container with timer */
    .loading-indicator {
      margin-top: 2.8rem;
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      position: relative;
      overflow: hidden;
    }

    .loading-progress {
      position: absolute;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #a7c0ff, #ffffff);
      border-radius: 40px;
      left: 0;
      top: 0;
      transition: width 0.1s linear;
      box-shadow: 0 0 12px #a7c0ff;
    }

    /* countdown timer text */
    .countdown {
      margin-top: 1.2rem;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
    }

    #timerSeconds {
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.1);
      padding: 0.2rem 0.8rem;
      border-radius: 60px;
      display: inline-block;
      margin-left: 6px;
    }

    /* version tag */
    .version-tag {
      margin-top: 2rem;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
      padding-top: 1.2rem;
      width: 70%;
      text-align: center;
    }

    @media (max-width: 450px) {
      .loading-splash {
        padding: 2.2rem 1rem;
        border-radius: 3rem;
      }
      .splash-text {
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>

<div class="loading-splash">

  <!-- LOGO -->
  <div class="logo-frame">
    <img 
      src="553106437_17845870137574455_8823922694648873162_n.jpg" 
      alt="Vista Orizon emblem"
      onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2245%22%20fill%3D%22%231e2a4a%22%20stroke%3D%22%23aaccff%22%20stroke-width%3D%223%22%2F%3E%3Ctext%20x%3D%2220%22%20y%3D%2265%22%20fill%3D%22%23ffffff%22%20font-size%3D%2214%22%3EVO%3C%2Ftext%3E%3C%2Fsvg%3E';"
    >
  </div>

  <!-- TYPOGRAPHY section (VISTA ORIZON) - SIMPLIFIED without spans -->
  <div class="text-zone">
    <p class="splash-text" id="typingTarget"></p>
  </div>

  <!-- loading bar with progress -->
  <div class="loading-indicator">
    <div class="loading-progress" id="progressBar"></div>
  </div>

  <!-- countdown display (seconds) -->
  <div class="countdown">
    entering in <span id="timerSeconds">4</span>s
  </div>

  <!-- tiny silent version -->
  <div class="version-tag">
    <span>✦ vista orizon ✦</span>
  </div>
</div>

<script>
  (function() {
    // ========== REDIRECT TARGET: LOCAL HOMEPAGE ==========
    const HOME_PAGE_URL = "homepage.html";

    // ========== TYPING ANIMATION ==========
    const fullText = "VISTA ORIZON";
    const target = document.getElementById("typingTarget");

    // Wait a moment for logo pop, then reveal and start typing
    setTimeout(() => {
      target.style.opacity = '1';
      target.innerText = ''; // Clear any existing text

      // start typing animation
      let idx = 0;
      const typingInterval = setInterval(() => {
        idx++;
        target.innerText = fullText.substring(0, idx);
        if (idx >= fullText.length) {
          clearInterval(typingInterval);
        }
      }, 110);
    }, 1000); // delay to sync with logo animation

    // ========== LOADING TIMER (4 seconds) + PROGRESS + REDIRECT ==========
    const totalSeconds = 4;
    const progressBar = document.getElementById('progressBar');
    const timerSpan = document.getElementById('timerSeconds');

    let timeLeft = totalSeconds;
    timerSpan.textContent = timeLeft;

    // update progress bar and timer every 100ms for smoothness
    const interval = setInterval(() => {
      timeLeft -= 0.1;
      const displayTime = Math.max(0, timeLeft).toFixed(1);
      timerSpan.textContent = displayTime;

      const percent = ((totalSeconds - timeLeft) / totalSeconds) * 100;
      progressBar.style.width = Math.min(100, percent) + '%';

      if (timeLeft <= 0) {
        clearInterval(interval);
        window.location.href = HOME_PAGE_URL;
      }
    }, 100);

    // fallback timeout
    setTimeout(() => {
      window.location.href = HOME_PAGE_URL;
    }, totalSeconds * 1000 + 200);
  })();
</script>

</body>
</html>
