<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vista Orizon | Premium Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    overflow-x: hidden;
    color:white;
    min-height:100vh;
}

/* Background Video */
.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-2;
}

/* Logo - responsive */
.top-left{
    position:fixed;
    top:20px;
    left:20px;
    z-index:5;
}

.top-left img{
    width:90px;
    transition:0.3s ease;
}

/* ================= NAV BUTTON ================= */
.menu-btn{
    position:fixed;
    top:22px;
    right:22px;
    width:40px;
    height:28px;
    cursor:pointer;
    z-index:10;
}

.menu-btn span{
    display:block;
    height:3px;
    width:100%;
    background:white;
    margin:6px 0;
    transition:0.4s ease;
    border-radius:2px;
}

/* Animated burger */
.menu-btn.active span:nth-child(1){
    transform:rotate(45deg) translate(6px,6px);
}

.menu-btn.active span:nth-child(2){
    opacity:0;
}

.menu-btn.active span:nth-child(3){
    transform:rotate(-45deg) translate(7px,-7px);
}

/* ================= SIDE NAV ================= */
.side-nav{
    position:fixed;
    top:0;
    right:-100%;
    width:280px;
    height:100%;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(15px);
    padding:100px 30px;
    transition:0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index:9;
}

.side-nav.active{
    right:0;
}

.side-nav ul{
    list-style:none;
}

.side-nav ul li{
    margin:28px 0;
}

.side-nav ul li a{
    color:white;
    text-decoration:none;
    font-size:1.2rem;
    font-weight:500;
    letter-spacing:1px;
    transition:0.3s;
    display:inline-block;
}

.side-nav ul li a:hover{
    color:#c2b23e;
    transform:translateX(8px);
}

/* ==== Center Wrapper ==== */
.center-page {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:30px;
    width:90%;
    max-width:1200px;
    padding:20px;
    pointer-events: auto;
}

/* Heading Styles - responsive */
.brand-title h1{
    font-size:clamp(1.8rem, 8vw, 3rem);
    font-weight:700;
    letter-spacing:2px;
    text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

.brand-title p{
    font-size:clamp(0.8rem, 4vw, 1.2rem);
    opacity:0.9;
    letter-spacing:1px;
    margin-top:5px;
}

/* ========== IMPROVED ICON GRID - RESPONSIVE ========== */
.png-grid{
    display:grid;
    grid-template-columns: repeat(3, minmax(85px, 130px));
    gap:clamp(15px, 4vw, 35px);
    justify-content:center;
    align-items:center;
    margin-top:10px;
}

/* Individual icon card */
.png-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    transition:all 0.3s ease;
    cursor:pointer;
}

/* ICON SIZE REDUCED and responsive */
.png-item img{
    width:clamp(65px, 12vw, 95px);
    height:auto;
    transition:0.3s ease;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}

/* Hover effect - smooth */
.png-item:hover img{
    transform:scale(1.08);
    filter:drop-shadow(0 0 12px rgba(194,178,62,0.5));
}

/* TEXT LABEL BELOW EACH ICON - NEW FEATURE */
.icon-label{
    margin-top:10px;
    font-size:clamp(0.7rem, 3vw, 0.85rem);
    font-weight:500;
    color:white;
    text-align:center;
    letter-spacing:0.5px;
    background:rgba(0,0,0,0.4);
    padding:5px 10px;
    border-radius:30px;
    backdrop-filter:blur(4px);
    transition:0.2s ease;
    width:auto;
    min-width:70px;
}

.png-item:hover .icon-label{
    background:rgba(194,178,62,0.7);
    color:#111;
    transform:translateY(-2px);
}

/* ================= SOCIAL BAR ================= */
.social-bar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:clamp(20px, 8vw, 40px);
    z-index:5;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(8px);
    padding:8px 20px;
    border-radius:50px;
}

.social-bar a{
    color:white;
    font-size:clamp(1rem, 5vw, 1.3rem);
    transition:0.3s ease;
}

.social-bar a:hover{
    color:#c2b23e;
    transform:translateY(-4px);
}

/* ========== MEDIA QUERIES - PERFECT FOR PHONES ========== */
@media (max-width: 768px) {
    .top-left img{
        width:70px;
    }
    
    .menu-btn{
        top:18px;
        right:18px;
        width:35px;
        height:26px;
    }
    
    .menu-btn span{
        margin:5px 0;
        height:2.5px;
    }
    
    .side-nav{
        width:260px;
        padding:90px 25px;
    }
    
    .side-nav ul li{
        margin:22px 0;
    }
    
    .side-nav ul li a{
        font-size:1.1rem;
    }
    
    /* GRID ADJUSTMENT for smaller screens - still 3 columns but tighter */
    .png-grid{
        grid-template-columns: repeat(3, minmax(70px, 100px));
        gap:clamp(12px, 3vw, 20px);
    }
    
    .png-item img{
        width:clamp(55px, 10vw, 75px);
    }
    
    .icon-label{
        margin-top:8px;
        font-size:0.65rem;
        padding:4px 8px;
        white-space: nowrap;
    }
    
    .center-page{
        gap:20px;
        width:95%;
    }
    
    .social-bar{
        gap:25px;
        padding:6px 18px;
        bottom:15px;
    }
}

/* For very small phones (max-width: 480px) */
@media (max-width: 480px) {
    .png-grid{
        grid-template-columns: repeat(3, minmax(68px, 85px));
        gap:12px;
    }
    
    .png-item img{
        width:60px;
    }
    
    .icon-label{
        font-size:0.6rem;
        padding:3px 6px;
        white-space: normal;
        word-break: keep-all;
        min-width: 60px;
    }
    
    .brand-title h1{
        font-size:1.8rem;
    }
    
    .brand-title p{
        font-size:0.75rem;
    }
    
    .social-bar a{
        font-size:0.9rem;
    }
    
    .top-left img{
        width:60px;
    }
}

/* For landscape mode on phones */
@media (max-width: 850px) and (orientation: landscape) {
    .center-page{
        gap:12px;
        transform:translate(-50%, -50%) scale(0.9);
    }
    
    .png-grid{
        gap:12px;
    }
    
    .png-item img{
        width:55px;
    }
    
    .icon-label{
        font-size:0.55rem;
        padding:2px 6px;
        margin-top:5px;
    }
    
    .brand-title h1{
        font-size:1.5rem;
    }
}

/* For tablets in portrait - smooth adjustment */
@media (min-width: 769px) and (max-width: 1024px) {
    .png-grid{
        grid-template-columns: repeat(3, minmax(110px, 140px));
        gap:25px;
    }
    
    .png-item img{
        width:95px;
    }
    
    .icon-label{
        font-size:0.75rem;
    }
}

/* Large desktop screens - maintain proportion */
@media (min-width: 1400px) {
    .png-grid{
        grid-template-columns: repeat(3, 150px);
        gap:45px;
    }
    
    .png-item img{
        width:115px;
    }
    
    .icon-label{
        font-size:0.9rem;
        padding:6px 14px;
    }
}

/* Accessibility & smoothness */
.png-item:focus-visible {
    outline: 2px solid #c2b23e;
    border-radius: 12px;
}

/* Fix for touch targets on mobile */
@media (hover: none) and (pointer: coarse) {
    .png-item {
        padding: 5px;
    }
    
    .png-item:active img {
        transform: scale(0.98);
    }
}
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop playsinline class="video-bg">
    <source src="YTDown.com_YouTube_Inside-The-World-s-Most-Secret-House-Bui_Media_OMUfmlPs_w4_001_1080p (1).mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Logo -->
<div class="top-left">
    <img src="553106437_17845870137574455_8823922694648873162_n-removebg-preview.png" alt="Vista Orizon Logo">
</div>

<!-- NAV BUTTON -->
<div class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- SIDE NAV -->
<div class="side-nav" id="sideNav">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact</a></li>

</div>

<!-- Centered Content with Icon Labels -->
<div class="center-page">
    <div class="brand-title">
        <h1>Vista Orizon</h1>
        <p>BY BRHILL ELITE</p>
    </div>

    <div class="png-grid">
        <!-- GAZEBO with text label -->
        <a href="gazebo.html" class="png-item">
            <img src="gazebo.png" alt="Gazebo Icon">

        <!-- CARPORTS with text label -->
        <a href="carports.html" class="png-item">
            <img src="carport.png" alt="Carport Icon">

        </a>
        <!-- BALUSTRADES with text label -->
        <a href="balustrades.html" class="png-item">
            <img src="balustrade.png" alt="Balustrade Icon">

        <!-- SHOWER CUBICLES with text label -->
        <a href="shower cubicles.html" class="png-item">

        <!-- PAGE6 / ADDITIONAL with text label -->
        <a href="page6.html" class="png-item">

</div>

<!-- SOCIAL MEDIA - Instagram, TikTok, WhatsApp (clean and modern) -->
<div class="social-bar">
    <a href="https://www.instagram.com/vista_orizon/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    <a href="https://www.tiktok.com/@vistaorizon" target="_blank" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>

</div>

<script>
function toggleMenu(){
    const menuBtn = document.querySelector('.menu-btn');
    const sideNav = document.getElementById('sideNav');
    menuBtn.classList.toggle('active');
    sideNav.classList.toggle('active');
}

// Optional: Close menu when clicking on a nav link (better UX on mobile)
document.querySelectorAll('.side-nav ul li a').forEach(link => {
    link.addEventListener('click', () => {
        const menuBtn = document.querySelector('.menu-btn');
        const sideNav = document.getElementById('sideNav');
        if(menuBtn.classList.contains('active')) {
            menuBtn.classList.remove('active');
            sideNav.classList.remove('active');
        }
    });
});

// Touch optimization: prevent zoom double-tap issues on icons for better mobile feel
const iconItems = document.querySelectorAll('.png-item');
iconItems.forEach(item => {
    item.addEventListener('touchstart', function(e) {
        // just allows native touch, no extra delay
    }, { passive: true });
});
</script>
</body>
</html>
