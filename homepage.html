<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista Orizon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    overflow:hidden;
    color:white;
}

/* Background Video */
.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-2;
}

/* Logo */
.top-left{
    position:fixed;
    top:25px;
    left:30px;
    z-index:5;
}

.top-left img{
    width:120px;
}

/* ================= NAV BUTTON ================= */
.menu-btn{
    position:fixed;
    top:30px;
    right:35px;
    width:45px;
    height:30px;
    cursor:pointer;
    z-index:10;
}

.menu-btn span{
    display:block;
    height:3px;
    width:100%;
    background:white;
    margin:7px 0;
    transition:0.4s ease;
}

/* Animated burger */
.menu-btn.active span:nth-child(1){
    transform:rotate(45deg) translate(6px,6px);
}

.menu-btn.active span:nth-child(2){
    opacity:0;
}

.menu-btn.active span:nth-child(3){
    transform:rotate(-45deg) translate(7px,-7px);
}

/* ================= SIDE NAV ================= */
.side-nav{
    position:fixed;
    top:0;
    right:-100%;
    width:320px;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(12px);
    padding:100px 40px;
    transition:0.6s ease;
    z-index:9;
}

.side-nav.active{
    right:0;
}

.side-nav ul{
    list-style:none;
}

.side-nav ul li{
    margin:25px 0;
}

.side-nav ul li a{
    color:white;
    text-decoration:none;
    font-size:20px;
    letter-spacing:2px;
    transition:0.3s;
}

.side-nav ul li a:hover{
    color:#c2b23e;
    padding-left:10px;
}

/* ==== Center Wrapper ==== */
.center-page {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:40px;
}

/* Grid */
.png-grid{
    display:grid;
    grid-template-columns: repeat(3, 150px);
    grid-template-rows: repeat(2, 150px);
    gap:30px;
}

.png-item img{
    width:120px;
    transition:0.3s ease;
}

.png-item:hover img{
    transform:scale(1.15);
    filter:drop-shadow(0 0 10px rgba(255,255,255,0.6));
}

/* ================= SOCIAL BAR ================= */
.social-bar{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:30px;
    z-index:5;
}

.social-bar a{
    color:white;
    font-size:18px;
    transition:0.3s ease;
}

.social-bar a:hover{
    color:#c2b23e;
    transform:translateY(-5px);
}

</style>
</head>

<body>

<!-- Background -->
<video autoplay muted loop playsinline class="video-bg">
    <source src="YTDown.com_YouTube_Inside-The-World-s-Most-Secret-House-Bui_Media_OMUfmlPs_w4_001_1080p (1).mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Logo -->
<div class="top-left">
    <img src="553106437_17845870137574455_8823922694648873162_n-removebg-preview.png">
</div>

<!-- NAV BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- SIDE NAV -->
<div class="side-nav" id="sideNav">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</div>

<!-- Centered Content -->
<div class="center-page">
    <div>
        <h1 style="font-size:3rem; font-weight:700; letter-spacing:2px;">Vista Orizon</h1>
        <p style="font-size:1.2rem; opacity:0.85;">BY BRHILL ELITE</p>
    </div>

    <div class="png-grid">
        <a href="gazebo.html" class="png-item"><img src="Screenshot_2026-02-25_12.47.48_PM-removebg-preview.png"></a>
        <a href="carports.html" class="png-item"><img src="Screenshot_2026-02-25_12.54.32_PM-removebg-preview.png"></a>
        <a href="balustrades.html" class="png-item"><img src="Screenshot_2026-02-25_12.54.53_PM-removebg-preview.png"></a>
        <a href="shower cubicles.html" class="png-item"><img src="Screenshot_2026-02-25_12.55.18_PM-removebg-preview.png"></a>
        <a href="curtain wall.html" class="png-item"><img src="Screenshot_2026-02-25_12.55.41_PM-removebg-preview.png"></a>
        <a href="page6.html" class="png-item"><img src="Screenshot_2026-02-25_12.55.54_PM-removebg-preview.png"></a>
    </div>
</div>

<!-- SOCIAL MEDIA -->
<div class="social-bar">
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
</div>

<script>
function toggleMenu(){
    document.querySelector('.menu-btn').classList.toggle('active');
    document.getElementById('sideNav').classList.toggle('active');
}
</script>

</body>
</html>
