<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Vista Orizon | Luxury Architectural Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
}

/* Premium Background with Gradient Overlay */
.hero-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: brightness(0.7);
}

.gradient-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.75) 100%);
    z-index: -1;
}

/* Elegant Floating Logo */
.logo-container {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 100;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.08);
    padding: 8px 18px;
    border-radius: 60px;
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.3s ease;
}

.logo-container img {
    height: 42px;
    width: auto;
    display: block;
}

/* Modern Menu Button - Glass Morphism */
.menu-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    z-index: 100;
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.menu-toggle:hover {
    background: rgba(194, 178, 62, 0.2);
    border-color: rgba(194, 178, 62, 0.5);
}

.menu-toggle span {
    width: 24px;
    height: 2px;
    background: white;
    border-radius: 2px;
    transition: all 0.3s ease;
}

.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(6px, 6px);
    background: #c2b23e;
}

.menu-toggle.active span:nth-child(2) {
    opacity: 0;
    transform: scaleX(0.8);
}

.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -6px);
    background: #c2b23e;
}

/* Sleek Side Navigation */
.side-nav-premium {
    position: fixed;
    top: 0;
    right: -100%;
    width: 85%;
    max-width: 380px;
    height: 100vh;
    background: rgba(10, 10, 10, 0.98);
    backdrop-filter: blur(20px);
    z-index: 99;
    padding: 100px 40px 40px;
    transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    border-left: 1px solid rgba(194, 178, 62, 0.3);
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
}

.side-nav-premium.active {
    right: 0;
}

.side-nav-premium ul {
    list-style: none;
}

.side-nav-premium ul li {
    margin: 32px 0;
    opacity: 0;
    transform: translateX(30px);
    transition: all 0.4s ease;
    transition-delay: calc(0.05s * var(--i, 0));
}

.side-nav-premium.active ul li {
    opacity: 1;
    transform: translateX(0);
}

.side-nav-premium ul li:nth-child(1) { --i: 1; }
.side-nav-premium ul li:nth-child(2) { --i: 2; }
.side-nav-premium ul li:nth-child(3) { --i: 3; }
.side-nav-premium ul li:nth-child(4) { --i: 4; }

.side-nav-premium ul li a {
    color: #fff;
    text-decoration: none;
    font-size: 1.6rem;
    font-weight: 500;
    font-family: 'Playfair Display', serif;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    display: inline-block;
    position: relative;
}

.side-nav-premium ul li a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 2px;
    background: #c2b23e;
    transition: width 0.3s ease;
}

.side-nav-premium ul li a:hover {
    color: #c2b23e;
    transform: translateX(8px);
}

.side-nav-premium ul li a:hover::after {
    width: 100%;
}

/* Main Content - Centered with Elegant Spacing */
.main-content {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 24px 100px;
}

.content-wrapper {
    max-width: 1200px;
    width: 100%;
    text-align: center;
}

/* Hero Section */
.hero-section {
    margin-bottom: 50px;
}

.hero-section h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 8vw, 4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, #c2b23e 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.subtitle {
    font-size: clamp(0.85rem, 4vw, 1.1rem);
    font-weight: 400;
    opacity: 0.85;
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
    display: inline-block;
}

.subtitle::before,
.subtitle::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30px;
    height: 1px;
    background: rgba(194, 178, 62, 0.5);
}

.subtitle::before {
    left: -40px;
}

.subtitle::after {
    right: -40px;
}

/* Elegant Icon Grid - Phone First Design */
.icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 130px));
    gap: 28px 20px;
    justify-content: center;
    align-items: start;
    margin-top: 30px;
}

.icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(4px);
    padding: 18px 12px 14px;
    border-radius: 24px;
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border: 1px solid rgba(255, 255, 255, 0.08);
    cursor: pointer;
}

.icon-card:hover {
    transform: translateY(-8px);
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(194, 178, 62, 0.4);
    box-shadow: 0 20px 35px -15px rgba(0,0,0,0.4);
}

.icon-card:active {
    transform: translateY(-2px);
}

/* Reduced Icon Size as Requested */
.icon-card img {
    width: clamp(60px, 13vw, 85px);
    height: auto;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.icon-card:hover img {
    transform: scale(1.05);
}

/* Text Label Below Icon - Enhanced Styling */
.icon-label {
    margin-top: 14px;
    font-size: clamp(0.7rem, 3.5vw, 0.85rem);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    transition: all 0.3s ease;
    width: fit-content;
    max-width: 100%;
}

.icon-card:hover .icon-label {
    background: #c2b23e;
    color: #0a0a0a;
    transform: scale(1.02);
}

/* Premium Social Bar */
.social-links {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 35px;
    padding: 18px 20px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(15px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 90;
}

.social-icon {
    color: #fff;
    font-size: 1.3rem;
    transition: all 0.3s ease;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    transition: all 0.3s ease;
}

.social-icon:hover {
    color: #c2b23e;
    transform: translateY(-5px);
    background: rgba(194, 178, 62, 0.15);
}

/* ========== RESPONSIVE DESIGN - PHONE EXCELLENCE ========== */
@media (max-width: 640px) {
    .logo-container {
        top: 16px;
        left: 16px;
        padding: 6px 14px;
    }
    
    .logo-container img {
        height: 32px;
    }
    
    .menu-toggle {
        top: 16px;
        right: 16px;
        width: 44px;
        height: 44px;
    }
    
    .main-content {
        padding: 90px 16px 80px;
    }
    
    .hero-section {
        margin-bottom: 35px;
    }
    
    /* Phone optimized grid: exactly 2 columns for better touch targets */
    .icon-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
    }
    
    .icon-card {
        padding: 16px 10px 12px;
    }
    
    .icon-card img {
        width: 70px;
    }
    
    .icon-label {
        font-size: 0.68rem;
        padding: 5px 10px;
        margin-top: 10px;
        letter-spacing: 0.5px;
    }
    
    .social-links {
        gap: 25px;
        padding: 12px 20px;
    }
    
    .social-icon {
        font-size: 1.1rem;
        width: 36px;
        height: 36px;
    }
    
    .subtitle::before,
    .subtitle::after {
        width: 20px;
    }
    
    .subtitle::before {
        left: -28px;
    }
    
    .subtitle::after {
        right: -28px;
    }
}

/* Small phones (below 400px) */
@media (max-width: 480px) {
    .icon-grid {
        gap: 14px;
    }
    
    .icon-card {
        padding: 14px 8px 10px;
    }
    
    .icon-card img {
        width: 58px;
    }
    
    .icon-label {
        font-size: 0.6rem;
        padding: 4px 8px;
        margin-top: 8px;
    }
    
    .hero-section h1 {
        font-size: 1.9rem;
    }
    
    .side-nav-premium {
        padding: 90px 30px 30px;
    }
    
    .side-nav-premium ul li a {
        font-size: 1.3rem;
    }
}

/* Tablets and medium screens - 3 columns */
@media (min-width: 641px) and (max-width: 1024px) {
    .icon-grid {
        grid-template-columns: repeat(3, minmax(110px, 140px));
        gap: 25px;
    }
    
    .icon-card img {
        width: 80px;
    }
    
    .icon-label {
        font-size: 0.75rem;
        padding: 6px 12px;
    }
}

/* Laptop and Desktop - Elegant 3 column layout */
@media (min-width: 1025px) {
    .icon-grid {
        grid-template-columns: repeat(3, minmax(130px, 160px));
        gap: 40px;
    }
    
    .icon-card {
        padding: 24px 16px 18px;
    }
    
    .icon-card img {
        width: 90px;
    }
    
    .icon-label {
        font-size: 0.8rem;
        padding: 7px 16px;
        margin-top: 16px;
    }
    
    .social-icon {
        font-size: 1.4rem;
        width: 45px;
        height: 45px;
    }
    
    .logo-container img {
        height: 48px;
    }
}

/* Landscape orientation for phones */
@media (max-width: 850px) and (orientation: landscape) {
    .main-content {
        padding: 70px 20px 70px;
    }
    
    .icon-grid {
        grid-template-columns: repeat(3, minmax(85px, 110px));
        gap: 15px;
    }
    
    .icon-card img {
        width: 55px;
    }
    
    .icon-label {
        font-size: 0.6rem;
        padding: 3px 8px;
        margin-top: 6px;
    }
    
    .hero-section {
        margin-bottom: 20px;
    }
    
    .hero-section h1 {
        font-size: 1.6rem;
    }
}

/* Touch-friendly improvements */
@media (hover: none) and (pointer: coarse) {
    .icon-card:active {
        transform: scale(0.97);
        background: rgba(194, 178, 62, 0.2);
    }
    
    .icon-card:active .icon-label {
        background: #c2b23e;
        color: #0a0a0a;
    }
}

/* Smooth scrolling and accessibility */
html {
    scroll-behavior: smooth;
}

::selection {
    background: #c2b23e;
    color: #0a0a0a;
}
</style>
</head>

<body>

<script>
// Premium Menu Toggle Function
function togglePremiumMenu() {
    const menuBtn = document.getElementById('menuToggle');
    const sideNav = document.getElementById('premiumSideNav');
    
    menuBtn.classList.toggle('active');
    sideNav.classList.toggle('active');
    
    // Prevent body scroll when menu is open (better mobile UX)
    if (sideNav.classList.contains('active')) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = '';
    }
}

// Close menu when clicking on a navigation link
document.querySelectorAll('.side-nav-premium ul li a').forEach(link => {
    link.addEventListener('click', (e) => {
        const menuBtn = document.getElementById('menuToggle');
        const sideNav = document.getElementById('premiumSideNav');
        
        if (sideNav.classList.contains('active')) {
            menuBtn.classList.remove('active');
            sideNav.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // Optional: smooth scroll to sections if needed
        const href = link.getAttribute('href');
        if (href && href !== '#') {
            // Allow normal navigation
            return;
        }
        e.preventDefault();
    });
});

// Close menu when clicking outside (optional but nice on desktop)
document.addEventListener('click', (e) => {
    const menuBtn = document.getElementById('menuToggle');
    const sideNav = document.getElementById('premiumSideNav');
    const isClickInsideNav = sideNav.contains(e.target);
    const isClickOnMenuBtn = menuBtn.contains(e.target);
    
    if (sideNav.classList.contains('active') && !isClickInsideNav && !isClickOnMenuBtn) {
        menuBtn.classList.remove('active');
        sideNav.classList.remove('active');
        document.body.style.overflow = '';
    }
});

// Handle window resize - reset body overflow if menu is open on resize
window.addEventListener('resize', () => {
    const sideNav = document.getElementById('premiumSideNav');
    if (window.innerWidth > 768 && sideNav.classList.contains('active')) {
        const menuBtn = document.getElementById('menuToggle');
        menuBtn.classList.remove('active');
        sideNav.classList.remove('active');
        document.body.style.overflow = '';
    }
});

// Add subtle animation on load
window.addEventListener('DOMContentLoaded', () => {
    const cards = document.querySelectorAll('.icon-card');
    cards.forEach((card, index) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        setTimeout(() => {
            card.style.transition = 'all 0.5s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        }, 100 + (index * 50));
    });
});

// Prevent zoom on double-tap for better mobile experience (optional)
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
        e.preventDefault();
    }
    lastTouchEnd = now;
}, false);
</script>
